<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1830 900" width="1830" height="900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<defs><marker id="arrow-causal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#a1a1aa"/></marker><marker id="arrow-parallel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3182ce"/></marker><marker id="arrow-flashback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#805ad5"/></marker><marker id="arrow-connection" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#38a169"/></marker><marker id="arrow-reveal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#d69e2e"/></marker><marker id="arrow-transform" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e53e3e"/></marker><marker id="arrow-default" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#a1a1aa"/></marker></defs>
<rect width="1830" height="900" fill="#0b0b0f"/>
<g id="title">
    <text x="60" y="40" fill="#f4f4f5" font-size="26" font-weight="700">Tenet — In Narrative Order</text>
    <text x="60" y="62" fill="#a1a1aa" font-size="13"><tspan x="60" dy="0">A CIA operative recruited into a shadowy war involving objects and people whose time flows backward. The film&apos;s second half loops back through the first half in inverse order.</tspan></text>
  </g>
<g id="map-body">
<g id="narrative-line"><line x1="140" y1="515" x2="1690" y2="515" stroke="#27272a" stroke-width="1" stroke-dasharray="2 3"/><text x="60" y="540" fill="#a1a1aa" font-size="11" font-weight="600" letter-spacing="1">NARRATIVE ORDER →</text></g><g id="edges" fill="none"><path d="M220,455 L253.75,455" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M995,455 L1028.75,455" stroke="#e53e3e" stroke-width="1.6" marker-end="url(#arrow-transform)"/><path d="M1610,455 Q915,315 220,455" stroke="#d69e2e" stroke-width="1.6" marker-end="url(#arrow-reveal)"/></g><g id="nodes"><g class="node" data-id="s1"><text x="140" y="417" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">OPEN</text><rect x="60" y="425" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="60" y="425" width="4" height="60" rx="2" fill="#e53e3e"/><text x="140" y="458" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="140" dy="0">Opera siege</tspan></text><text x="140" y="499" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="140" dy="0">Protagonist captured,</tspan><tspan x="140" dy="12">swallows cyanide pill, wakes</tspan><tspan x="140" dy="12">up recruited</tspan></text></g><g class="node" data-id="s2"><text x="333.75" y="417" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">+2</text><rect x="253.75" y="425" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="253.75" y="425" width="4" height="60" rx="2" fill="#e53e3e"/><text x="333.75" y="458" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="333.75" dy="0">Mumbai arms dealer</tspan></text><text x="333.75" y="499" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="333.75" dy="0">First encounter with</tspan><tspan x="333.75" dy="12">inverted bullets — Priya</tspan><tspan x="333.75" dy="12">introduces Tenet</tspan></text></g><g class="node" data-id="s3"><text x="527.5" y="417" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">+3</text><rect x="447.5" y="425" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="447.5" y="425" width="4" height="60" rx="2" fill="#e53e3e"/><text x="527.5" y="458" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="527.5" dy="0">Oslo freeport</tspan></text><text x="527.5" y="499" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="527.5" dy="0">Heist pre-planning with</tspan><tspan x="527.5" dy="12">Neil. Turnstile glimpsed</tspan></text></g><g class="node" data-id="s4"><text x="721.25" y="417" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">+4</text><rect x="641.25" y="425" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="641.25" y="425" width="4" height="60" rx="2" fill="#e53e3e"/><text x="721.25" y="458" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="721.25" dy="0">Freeport heist</tspan></text><text x="721.25" y="499" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="721.25" dy="0">Two versions of Protagonist</tspan><tspan x="721.25" dy="12">fight, one inverted</tspan></text></g><g class="node" data-id="s5"><text x="915" y="417" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">+5</text><rect x="835" y="425" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="835" y="425" width="4" height="60" rx="2" fill="#e53e3e"/><text x="915" y="458" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="915" dy="0">Tallinn chase</tspan></text><text x="915" y="499" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="915" dy="0">Inverted BMW, algorithm</tspan><tspan x="915" dy="12">briefcase, Kat shot</tspan></text></g><g class="node" data-id="s6"><text x="1108.75" y="417" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">-5</text><rect x="1028.75" y="425" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="1028.75" y="425" width="4" height="60" rx="2" fill="#e53e3e"/><text x="1108.75" y="458" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="1108.75" dy="0">Inverted Tallinn</tspan></text><text x="1108.75" y="499" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="1108.75" dy="0">Protagonist moves backward</tspan><tspan x="1108.75" dy="12">through same chase to save</tspan><tspan x="1108.75" dy="12">Kat</tspan></text></g><g class="node" data-id="s7"><text x="1302.5" y="417" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">-4</text><rect x="1222.5" y="425" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="1222.5" y="425" width="4" height="60" rx="2" fill="#e53e3e"/><text x="1302.5" y="458" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="1302.5" dy="0">Back to Oslo</tspan></text><text x="1302.5" y="499" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="1302.5" dy="0">Reverses to meet his past</tspan><tspan x="1302.5" dy="12">self at the turnstile</tspan></text></g><g class="node" data-id="s8"><text x="1496.25" y="417" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">-2</text><rect x="1416.25" y="425" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="1416.25" y="425" width="4" height="60" rx="2" fill="#e53e3e"/><text x="1496.25" y="458" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="1496.25" dy="0">Stalsk-12 assault</tspan></text><text x="1496.25" y="499" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="1496.25" dy="0">Temporal pincer — two teams</tspan><tspan x="1496.25" dy="12">from opposite time</tspan><tspan x="1496.25" dy="12">directions</tspan></text></g><g class="node" data-id="s9"><text x="1690" y="417" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">CLOSE</text><rect x="1610" y="425" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="1610" y="425" width="4" height="60" rx="2" fill="#e53e3e"/><text x="1690" y="458" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="1690" dy="0">Algorithm buried</tspan></text><text x="1690" y="499" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="1690" dy="0">Neil sacrifices himself,</tspan><tspan x="1690" dy="12">loop completes, posterity</tspan><tspan x="1690" dy="12">saved</tspan></text></g></g><g id="edge-labels"><rect x="990.375" y="399" width="43" height="14" rx="3" fill="#0b0b0f" stroke="#e53e3e" stroke-width="0.5" opacity="0.95"/><text x="1011.875" y="409" fill="#e53e3e" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">invert</text><rect x="899" y="305" width="32" height="14" rx="3" fill="#0b0b0f" stroke="#d69e2e" stroke-width="0.5" opacity="0.95"/><text x="915" y="315" fill="#d69e2e" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">loop</text></g>
</g>

</svg>