<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<defs><marker id="arrow-causal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#a1a1aa"/></marker><marker id="arrow-parallel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3182ce"/></marker><marker id="arrow-flashback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#805ad5"/></marker><marker id="arrow-connection" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#38a169"/></marker><marker id="arrow-reveal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#d69e2e"/></marker><marker id="arrow-transform" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e53e3e"/></marker><marker id="arrow-default" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#a1a1aa"/></marker></defs>
<rect width="1400" height="900" fill="#0b0b0f"/>
<g id="title">
    <text x="60" y="40" fill="#f4f4f5" font-size="26" font-weight="700">Tenet — Forward and Reverse</text>
    <text x="60" y="62" fill="#a1a1aa" font-size="13"><tspan x="60" dy="0">A CIA operative recruited into a shadowy war involving objects and people whose time flows backward. The film&apos;s second half loops back through the first half in inverse order.</tspan></text>
  </g>
<g id="map-body">
<g id="lanes"><g class="lane" data-lane="Forward time"><text x="60" y="108" fill="#a1a1aa" font-size="11" font-weight="600" letter-spacing="1">FORWARD TIME</text><line x1="60" y1="272.5" x2="1340" y2="272.5" stroke="#27272a" stroke-width="1"/></g><g class="lane" data-lane="Inverted time"><text x="60" y="473" fill="#a1a1aa" font-size="11" font-weight="600" letter-spacing="1">INVERTED TIME</text><line x1="60" y1="637.5" x2="1340" y2="637.5" stroke="#27272a" stroke-width="1"/></g></g><g id="edges" fill="none"><path d="M220,272.5 L340,272.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M500,272.5 Q560,219.5 620,272.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M780,272.5 Q840,219.5 900,272.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M1060,272.5 L1180,272.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M1180,298.57142857142856 Q656.6204699991226,321.8902093123763 220,611.4285714285714" stroke="#e53e3e" stroke-width="1.6" marker-end="url(#arrow-transform)"/><path d="M220,637.5 Q326.66666666666663,572.8333333333334 433.33333333333326,637.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M593.3333333333333,637.5 Q700,572.8333333333334 806.6666666666666,637.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M966.6666666666666,637.5 Q1073.3333333333333,572.8333333333334 1180,637.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M1180,611.4285714285714 Q743.3795300008774,321.8902093123763 220,298.57142857142856" stroke="#d69e2e" stroke-width="1.6" marker-end="url(#arrow-reveal)"/></g><g id="nodes"><g class="node" data-id="n1"><text x="140" y="234.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">OPEN</text><rect x="60" y="242.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="60" y="242.5" width="4" height="60" rx="2" fill="#3182ce"/><text x="140" y="275.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="140" dy="0">Opera siege</tspan></text><text x="140" y="316.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="140" dy="0">Protagonist captured,</tspan><tspan x="140" dy="12">swallows cyanide pill, wakes</tspan><tspan x="140" dy="12">up recruited</tspan></text></g><g class="node" data-id="n2"><text x="420" y="234.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">+2</text><rect x="340" y="242.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="340" y="242.5" width="4" height="60" rx="2" fill="#3182ce"/><text x="420" y="275.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="420" dy="0">Mumbai arms dealer</tspan></text><text x="420" y="316.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="420" dy="0">First encounter with</tspan><tspan x="420" dy="12">inverted bullets — Priya</tspan><tspan x="420" dy="12">introduces Tenet</tspan></text></g><g class="node" data-id="n3"><text x="700" y="234.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">+3</text><rect x="620" y="242.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="620" y="242.5" width="4" height="60" rx="2" fill="#3182ce"/><text x="700" y="275.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="700" dy="0">Oslo freeport</tspan></text><text x="700" y="316.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="700" dy="0">Heist pre-planning with</tspan><tspan x="700" dy="12">Neil. Turnstile glimpsed</tspan></text></g><g class="node" data-id="n4"><text x="980" y="234.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">+4</text><rect x="900" y="242.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="900" y="242.5" width="4" height="60" rx="2" fill="#3182ce"/><text x="980" y="275.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="980" dy="0">Freeport heist</tspan></text><text x="980" y="316.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="980" dy="0">Two versions of Protagonist</tspan><tspan x="980" dy="12">fight, one inverted</tspan></text></g><g class="node" data-id="n5"><text x="1260" y="234.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">+5</text><rect x="1180" y="242.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="1180" y="242.5" width="4" height="60" rx="2" fill="#3182ce"/><text x="1260" y="275.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="1260" dy="0">Tallinn chase</tspan></text><text x="1260" y="316.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="1260" dy="0">Inverted BMW, algorithm</tspan><tspan x="1260" dy="12">briefcase, Kat shot</tspan></text></g><g class="node" data-id="n6"><text x="140" y="599.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">-5</text><rect x="60" y="607.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="60" y="607.5" width="4" height="60" rx="2" fill="#e53e3e"/><text x="140" y="640.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="140" dy="0">Inverted Tallinn</tspan></text><text x="140" y="681.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="140" dy="0">Protagonist now moves</tspan><tspan x="140" dy="12">backward through same chase</tspan><tspan x="140" dy="12">to save Kat</tspan></text></g><g class="node" data-id="n7"><text x="513.3333333333333" y="599.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">-4</text><rect x="433.33333333333326" y="607.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="433.33333333333326" y="607.5" width="4" height="60" rx="2" fill="#e53e3e"/><text x="513.3333333333333" y="640.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="513.3333333333333" dy="0">Back to Oslo</tspan></text><text x="513.3333333333333" y="681.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="513.3333333333333" dy="0">Reverses to meet his past</tspan><tspan x="513.3333333333333" dy="12">self at the turnstile</tspan></text></g><g class="node" data-id="n8"><text x="886.6666666666666" y="599.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">-2</text><rect x="806.6666666666666" y="607.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="806.6666666666666" y="607.5" width="4" height="60" rx="2" fill="#e53e3e"/><text x="886.6666666666666" y="640.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="886.6666666666666" dy="0">Stalsk-12 assault</tspan></text><text x="886.6666666666666" y="681.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="886.6666666666666" dy="0">Temporal pincer — two teams</tspan><tspan x="886.6666666666666" dy="12">from opposite time</tspan><tspan x="886.6666666666666" dy="12">directions</tspan></text></g><g class="node" data-id="n9"><text x="1260" y="599.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">CLOSE</text><rect x="1180" y="607.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="1180" y="607.5" width="4" height="60" rx="2" fill="#e53e3e"/><text x="1260" y="640.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="1260" dy="0">Algorithm buried</tspan></text><text x="1260" y="681.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="1260" dy="0">Neil sacrifices himself,</tspan><tspan x="1260" dy="12">loop completes, posterity</tspan><tspan x="1260" dy="12">saved</tspan></text></g></g><g id="edge-labels"><rect x="635.1204699991226" y="311.8902093123763" width="43" height="14" rx="3" fill="#0b0b0f" stroke="#e53e3e" stroke-width="0.5" opacity="0.95"/><text x="656.6204699991226" y="321.8902093123763" fill="#e53e3e" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">invert</text><rect x="727.3795300008774" y="311.8902093123763" width="32" height="14" rx="3" fill="#0b0b0f" stroke="#d69e2e" stroke-width="0.5" opacity="0.95"/><text x="743.3795300008774" y="321.8902093123763" fill="#d69e2e" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">loop</text></g>
</g>
