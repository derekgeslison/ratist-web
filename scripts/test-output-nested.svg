<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<defs><marker id="arrow-causal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#a1a1aa"/></marker><marker id="arrow-parallel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3182ce"/></marker><marker id="arrow-flashback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#805ad5"/></marker><marker id="arrow-connection" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#38a169"/></marker><marker id="arrow-reveal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#d69e2e"/></marker><marker id="arrow-transform" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e53e3e"/></marker><marker id="arrow-default" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#a1a1aa"/></marker></defs>
<rect width="1400" height="900" fill="#0b0b0f"/>
<g id="title">
    <text x="60" y="40" fill="#f4f4f5" font-size="26" font-weight="700">Inception — The Five Levels</text>
    <text x="60" y="62" fill="#a1a1aa" font-size="13"><tspan x="60" dy="0">Cobb&apos;s team descends through three nested dream layers to plant an idea in Fischer&apos;s mind. Reality and limbo bookend the journey.</tspan></text>
  </g>
<g id="map-body">
<g id="layers"><g class="layer" data-layer="Reality"><rect x="100" y="105" width="1200" height="700" rx="16" fill="none" stroke="#a1a1aa" stroke-width="2" opacity="0.7"/><text x="114" y="127" fill="#a1a1aa" font-size="12" font-weight="700" letter-spacing="1">REALITY</text></g><g class="layer" data-layer="L1 — Van"><rect x="220" y="175" width="960" height="560" rx="16" fill="none" stroke="#3182ce" stroke-width="2" opacity="0.7"/><text x="234" y="197" fill="#3182ce" font-size="12" font-weight="700" letter-spacing="1">L1 — VAN</text></g><g class="layer" data-layer="L2 — Hotel"><rect x="340" y="245" width="720" height="420" rx="16" fill="none" stroke="#38a169" stroke-width="2" opacity="0.7"/><text x="354" y="267" fill="#38a169" font-size="12" font-weight="700" letter-spacing="1">L2 — HOTEL</text></g><g class="layer" data-layer="L3 — Fortress"><rect x="460" y="315" width="480" height="280" rx="16" fill="none" stroke="#d69e2e" stroke-width="2" opacity="0.7"/><text x="474" y="337" fill="#d69e2e" font-size="12" font-weight="700" letter-spacing="1">L3 — FORTRESS</text></g><g class="layer" data-layer="Limbo"><rect x="580" y="385" width="240" height="140" rx="16" fill="none" stroke="#805ad5" stroke-width="2" opacity="0.7"/><text x="594" y="407" fill="#805ad5" font-size="12" font-weight="700" letter-spacing="1">LIMBO</text></g></g><g id="edges" fill="none"><path d="M700,174 L700,184" stroke="#e53e3e" stroke-width="1.6" marker-end="url(#arrow-transform)"/><path d="M700,244 L700,254" stroke="#e53e3e" stroke-width="1.6" marker-end="url(#arrow-transform)"/><path d="M700,314 L700,324" stroke="#e53e3e" stroke-width="1.6" marker-end="url(#arrow-transform)"/><path d="M700,384 L700,435" stroke="#805ad5" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow-flashback)"/><path d="M700,586 L700,596" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M700,656 L700,666" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M700,726 L700,736" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/></g><g id="nodes"><g class="node" data-id="r1"><text x="700" y="106" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">0H</text><rect x="620" y="114" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#a1a1aa" stroke-width="2"/><rect x="620" y="114" width="4" height="60" rx="2" fill="#a1a1aa"/><text x="700" y="147" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="700" dy="0">Plane departs</tspan></text><text x="700" y="188" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="700" dy="0">10h flight, Sydney → LA</tspan></text></g><g class="node" data-id="r2"><text x="700" y="728" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">10H</text><rect x="620" y="736" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#a1a1aa" stroke-width="2"/><rect x="620" y="736" width="4" height="60" rx="2" fill="#a1a1aa"/><text x="700" y="769" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="700" dy="0">Plane lands</tspan></text></g><g class="node" data-id="l1-1"><text x="700" y="176" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">1 WEEK</text><rect x="620" y="184" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="620" y="184" width="4" height="60" rx="2" fill="#3182ce"/><text x="700" y="217" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="700" dy="0">Van chase</tspan></text></g><g class="node" data-id="l1-2"><text x="700" y="658" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">END</text><rect x="620" y="666" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="620" y="666" width="4" height="60" rx="2" fill="#3182ce"/><text x="700" y="699" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="700" dy="0">Van falls</tspan></text><text x="700" y="740" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="700" dy="0">Kick 1</tspan></text></g><g class="node" data-id="l2-1"><text x="700" y="246" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">6 MONTHS</text><rect x="620" y="254" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#38a169" stroke-width="2"/><rect x="620" y="254" width="4" height="60" rx="2" fill="#38a169"/><text x="700" y="287" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="700" dy="0">Hotel corridor</tspan></text><text x="700" y="328" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="700" dy="0">No gravity</tspan></text></g><g class="node" data-id="l2-2"><text x="700" y="588" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">END</text><rect x="620" y="596" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#38a169" stroke-width="2"/><rect x="620" y="596" width="4" height="60" rx="2" fill="#38a169"/><text x="700" y="629" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="700" dy="0">Elevator kick</tspan></text></g><g class="node" data-id="l3-1"><text x="700" y="316" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">10 YEARS</text><rect x="620" y="324" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#d69e2e" stroke-width="2"/><rect x="620" y="324" width="4" height="60" rx="2" fill="#d69e2e"/><text x="700" y="357" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="700" dy="0">Fortress assault</tspan></text></g><g class="node" data-id="l3-2"><text x="700" y="518" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">END</text><rect x="620" y="526" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#d69e2e" stroke-width="2"/><rect x="620" y="526" width="4" height="60" rx="2" fill="#d69e2e"/><text x="700" y="559" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="700" dy="0">Dying room</tspan></text></g><g class="node" data-id="limbo-1"><text x="700" y="427" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">50+ YEARS</text><rect x="620" y="435" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#805ad5" stroke-width="2"/><rect x="620" y="435" width="4" height="60" rx="2" fill="#805ad5"/><text x="700" y="468" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="700" dy="0">Cobb &amp; Mal&apos;s city</tspan></text><text x="700" y="509" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="700" dy="0">Built together</tspan></text></g></g><g id="edge-labels"><rect x="664.5" y="169" width="43" height="14" rx="3" fill="#0b0b0f" stroke="#e53e3e" stroke-width="0.5" opacity="0.95"/><text x="686" y="179" fill="#e53e3e" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">sedate</text><rect x="648" y="239" width="76" height="14" rx="3" fill="#0b0b0f" stroke="#e53e3e" stroke-width="0.5" opacity="0.95"/><text x="686" y="249" fill="#e53e3e" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">dream deeper</text><rect x="653.5" y="399.5" width="65" height="14" rx="3" fill="#0b0b0f" stroke="#805ad5" stroke-width="0.5" opacity="0.95"/><text x="686" y="409.5" fill="#805ad5" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">Cobb falls</text><rect x="670" y="581" width="32" height="14" rx="3" fill="#0b0b0f" stroke="#a1a1aa" stroke-width="0.5" opacity="0.95"/><text x="686" y="591" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">kick</text><rect x="670" y="651" width="32" height="14" rx="3" fill="#0b0b0f" stroke="#a1a1aa" stroke-width="0.5" opacity="0.95"/><text x="686" y="661" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">kick</text><rect x="670" y="721" width="32" height="14" rx="3" fill="#0b0b0f" stroke="#a1a1aa" stroke-width="0.5" opacity="0.95"/><text x="686" y="731" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">wake</text></g>
</g>
