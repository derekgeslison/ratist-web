<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 900" width="1400" height="900" font-family="system-ui, -apple-system, 'Segoe UI', sans-serif">
<defs><marker id="arrow-causal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#a1a1aa"/></marker><marker id="arrow-parallel" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#3182ce"/></marker><marker id="arrow-flashback" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#805ad5"/></marker><marker id="arrow-connection" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#38a169"/></marker><marker id="arrow-reveal" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#d69e2e"/></marker><marker id="arrow-transform" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#e53e3e"/></marker><marker id="arrow-default" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse"><path d="M0,0 L10,5 L0,10 z" fill="#a1a1aa"/></marker></defs>
<rect width="1400" height="900" fill="#0b0b0f"/>
<g id="title">
    <text x="60" y="40" fill="#f4f4f5" font-size="26" font-weight="700">Memento — Two Paths</text>
    <text x="60" y="62" fill="#a1a1aa" font-size="13"><tspan x="60" dy="0">Leonard&apos;s memory disorder is traced by two interleaved timelines: a colour sequence running backward and a black-and-white sequence running forward, converging at the film&apos;s middle.</tspan></text>
  </g>
<g id="map-body">
<g id="lanes"><g class="lane" data-lane="Colour — reverse"><text x="60" y="108" fill="#a1a1aa" font-size="11" font-weight="600" letter-spacing="1">COLOUR — REVERSE</text><line x1="60" y1="272.5" x2="1340" y2="272.5" stroke="#27272a" stroke-width="1"/></g><g class="lane" data-lane="B&amp;W — forward"><text x="60" y="473" fill="#a1a1aa" font-size="11" font-weight="600" letter-spacing="1">B&amp;W — FORWARD</text><line x1="60" y1="637.5" x2="1340" y2="637.5" stroke="#27272a" stroke-width="1"/></g></g><g id="edges" fill="none"><path d="M1180,272.5 L966.6666666666666,272.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M806.6666666666666,272.5 L593.3333333333333,272.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M433.33333333333326,272.5 L220,272.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M220,637.5 L433.33333333333326,637.5" stroke="#805ad5" stroke-width="1.6" stroke-dasharray="6 4" marker-end="url(#arrow-flashback)"/><path d="M593.3333333333333,637.5 L806.6666666666666,637.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M966.6666666666666,637.5 L1180,637.5" stroke="#a1a1aa" stroke-width="1.6" marker-end="url(#arrow-causal)"/><path d="M1180,611.4285714285714 Q743.3795300008774,321.8902093123763 220,298.57142857142856" stroke="#d69e2e" stroke-width="1.6" marker-end="url(#arrow-reveal)"/></g><g id="nodes"><g class="node" data-id="c1"><text x="140" y="234.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">SCENE 22</text><rect x="60" y="242.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="60" y="242.5" width="4" height="60" rx="2" fill="#e53e3e"/><text x="140" y="275.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="140" dy="0">Kills Teddy</tspan></text><text x="140" y="316.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="140" dy="0">Film opens here</tspan><tspan x="140" dy="12">chronologically last</tspan></text></g><g class="node" data-id="c2"><text x="513.3333333333333" y="234.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">SCENE 18</text><rect x="433.33333333333326" y="242.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="433.33333333333326" y="242.5" width="4" height="60" rx="2" fill="#e53e3e"/><text x="513.3333333333333" y="275.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="513.3333333333333" dy="0">Meets Natalie</tspan></text></g><g class="node" data-id="c3"><text x="886.6666666666666" y="234.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">SCENE 12</text><rect x="806.6666666666666" y="242.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="806.6666666666666" y="242.5" width="4" height="60" rx="2" fill="#e53e3e"/><text x="886.6666666666666" y="275.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="886.6666666666666" dy="0">Gets tattoo</tspan></text></g><g class="node" data-id="c4"><text x="1260" y="234.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">SCENE 6</text><rect x="1180" y="242.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#e53e3e" stroke-width="2"/><rect x="1180" y="242.5" width="4" height="60" rx="2" fill="#e53e3e"/><text x="1260" y="275.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="1260" dy="0">Photo of Teddy</tspan></text></g><g class="node" data-id="b1"><text x="140" y="599.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">SCENE 1</text><rect x="60" y="607.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="60" y="607.5" width="4" height="60" rx="2" fill="#3182ce"/><text x="140" y="640.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="140" dy="0">Motel call</tspan></text><text x="140" y="681.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="140" dy="0">First chronologically</tspan></text></g><g class="node" data-id="b2"><text x="513.3333333333333" y="599.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">SCENE 5</text><rect x="433.33333333333326" y="607.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="433.33333333333326" y="607.5" width="4" height="60" rx="2" fill="#3182ce"/><text x="513.3333333333333" y="640.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="513.3333333333333" dy="0">Sammy flashback</tspan></text></g><g class="node" data-id="b3"><text x="886.6666666666666" y="599.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">SCENE 11</text><rect x="806.6666666666666" y="607.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="806.6666666666666" y="607.5" width="4" height="60" rx="2" fill="#3182ce"/><text x="886.6666666666666" y="640.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="886.6666666666666" dy="0">Drives to lot</tspan></text></g><g class="node" data-id="b4"><text x="1260" y="599.5" fill="#a1a1aa" font-size="10" text-anchor="middle" letter-spacing="1">SCENE 17</text><rect x="1180" y="607.5" width="160" height="60" rx="10" fill="#0b0b0f" stroke="#3182ce" stroke-width="2"/><rect x="1180" y="607.5" width="4" height="60" rx="2" fill="#3182ce"/><text x="1260" y="640.5" fill="#f4f4f5" font-size="12" font-weight="600" text-anchor="middle"><tspan x="1260" dy="0">Burns evidence</tspan></text><text x="1260" y="681.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic"><tspan x="1260" dy="0">Lanes converge here</tspan></text></g></g><g id="edge-labels"><rect x="307.91666666666663" y="216.5" width="37.5" height="14" rx="3" fill="#0b0b0f" stroke="#a1a1aa" stroke-width="0.5" opacity="0.95"/><text x="326.66666666666663" y="226.5" fill="#a1a1aa" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">kills</text><rect x="296.91666666666663" y="581.5" width="59.5" height="14" rx="3" fill="#0b0b0f" stroke="#805ad5" stroke-width="0.5" opacity="0.95"/><text x="326.66666666666663" y="591.5" fill="#805ad5" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">remembers</text><rect x="710.8795300008774" y="311.8902093123763" width="65" height="14" rx="3" fill="#0b0b0f" stroke="#d69e2e" stroke-width="0.5" opacity="0.95"/><text x="743.3795300008774" y="321.8902093123763" fill="#d69e2e" font-size="10" text-anchor="middle" font-style="italic" dominant-baseline="middle">lanes meet</text></g>
</g>
